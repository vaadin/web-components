<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Breadcrumb</title>
    <script type="module" src="./common.js"></script>

    <script type="module">
      import '@vaadin/breadcrumb';
    </script>

    <style>
      body {
        padding: 2em;
      }

      h3 {
        margin-top: 2em;
      }
    </style>
  </head>

  <body>
    <h3>Basic Navigation</h3>
    <vaadin-breadcrumb>
      <vaadin-breadcrumb-item path="/">Home</vaadin-breadcrumb-item>
      <vaadin-breadcrumb-item path="/products">Products</vaadin-breadcrumb-item>
      <vaadin-breadcrumb-item path="/products/widgets">Widgets</vaadin-breadcrumb-item>
      <vaadin-breadcrumb-item>Sprocket</vaadin-breadcrumb-item>
    </vaadin-breadcrumb>

    <h3>Two Items</h3>
    <vaadin-breadcrumb>
      <vaadin-breadcrumb-item path="/">Home</vaadin-breadcrumb-item>
      <vaadin-breadcrumb-item>Products</vaadin-breadcrumb-item>
    </vaadin-breadcrumb>

    <h3>Single Item (Current Page)</h3>
    <vaadin-breadcrumb>
      <vaadin-breadcrumb-item>Home</vaadin-breadcrumb-item>
    </vaadin-breadcrumb>

    <h3>With Disabled Item</h3>
    <vaadin-breadcrumb>
      <vaadin-breadcrumb-item path="/">Home</vaadin-breadcrumb-item>
      <vaadin-breadcrumb-item path="/products" disabled>Products</vaadin-breadcrumb-item>
      <vaadin-breadcrumb-item>Widgets</vaadin-breadcrumb-item>
    </vaadin-breadcrumb>

    <h3>Long Path</h3>
    <vaadin-breadcrumb>
      <vaadin-breadcrumb-item path="/">Home</vaadin-breadcrumb-item>
      <vaadin-breadcrumb-item path="/products">Products</vaadin-breadcrumb-item>
      <vaadin-breadcrumb-item path="/products/widgets">Widgets</vaadin-breadcrumb-item>
      <vaadin-breadcrumb-item path="/products/widgets/sprockets">Sprockets</vaadin-breadcrumb-item>
      <vaadin-breadcrumb-item path="/products/widgets/sprockets/turbo">Turbo</vaadin-breadcrumb-item>
      <vaadin-breadcrumb-item>Turbo Sprocket Pro Max</vaadin-breadcrumb-item>
    </vaadin-breadcrumb>
  </body>
</html>
