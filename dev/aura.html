<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Aura</title>
    <link rel="stylesheet" href="../packages/aura/aura.css" />
    <link rel="stylesheet" href="./aura/aura-view.css" />
    <link rel="stylesheet" href="./aura/aura-extras.css" />
    <link rel="stylesheet" href="./aura/aura-control.css" />
    <script type="module">
      window.Vaadin ||= {};
      window.Vaadin.featureFlags ||= {};
      window.Vaadin.featureFlags.masterDetailLayoutComponent = true;
      window.Vaadin.featureFlags.badgeComponent = true;
    </script>
    <script type="module">
      import './aura/aura-theme-editor.js';
      import './aura/components-view.js';
      import './aura/dashboard-view.js';
      import './aura/grid-mdl-view.js';
      import '@vaadin/app-layout';
      import '@vaadin/app-layout/src/vaadin-drawer-toggle.js';
      import '@vaadin/badge';
      import '@vaadin/icons';
      import '@vaadin/item';

      // Fake navigation: prevent navigation, update 'current' item manually
      const appLayout = document.querySelector('vaadin-app-layout');

      const findNavItemByViewName = (viewName) =>
        Array.from(document.querySelectorAll('vaadin-side-nav-item[data-view-name]')).find(
          (item) => item.dataset.viewName === viewName,
        );

      const getCurrentViewElement = () => Array.from(appLayout.children).find((el) => !el.hasAttribute('slot'));

      const setCurrentItem = (currentItem) => {
        document.querySelectorAll('vaadin-side-nav-item').forEach((item) => item.removeAttribute('current'));

        if (currentItem) {
          currentItem.setAttribute('current', '');
        }
      };

      const showView = (viewName) => {
        if (!viewName) {
          return;
        }

        const currentView = getCurrentViewElement();
        if (currentView?.localName !== viewName) {
          currentView?.remove();
          const view = document.createElement(viewName);
          appLayout.append(view);
        }
      };

      const navigateToItem = (item, updateHash = true) => {
        if (!item) {
          return;
        }

        setCurrentItem(item);

        const { viewName } = item.dataset;
        if (viewName) {
          showView(viewName);

          if (updateHash && decodeURIComponent(window.location.hash.slice(1)) !== viewName) {
            window.location.hash = encodeURIComponent(viewName);
          }
        }
      };

      document.querySelectorAll('vaadin-side-nav').forEach((nav) => {
        nav.addEventListener('click', (e) => {
          const item = e.target.closest('vaadin-side-nav-item');
          if (item) {
            e.preventDefault();
            navigateToItem(item);
          }
        });
      });

      window.addEventListener('hashchange', () => {
        const viewName = decodeURIComponent(window.location.hash.slice(1));
        const item = findNavItemByViewName(viewName);

        if (item) {
          navigateToItem(item, false);
        }
      });

      const viewNameFromHash = decodeURIComponent(window.location.hash.slice(1));
      const hashedItem = findNavItemByViewName(viewNameFromHash);

      if (hashedItem) {
        navigateToItem(hashedItem, false);
      } else {
        const currentViewName = getCurrentViewElement()?.localName;
        const currentItem = findNavItemByViewName(currentViewName);

        if (currentItem) {
          navigateToItem(currentItem, false);
        }
      }
    </script>
  </head>
  <body>
    <vaadin-app-layout>
      <header slot="drawer" class="aura-view-header">
        <!-- TODO need to figure out a way to align things in the header with the side nav items. CSS subgrid perhaps? -->
        <vaadin-avatar
          theme="vaadin square filled"
          style="
            --vaadin-avatar-size: 1.25lh;
            margin-inline: calc(
              var(--vaadin-padding-inline-container) - var(--vaadin-side-nav-item-border-width) -
                (var(--vaadin-avatar-size) - var(--vaadin-icon-size, 1lh)) / 2
            );
          "
        ></vaadin-avatar>
        <div class="aura-view-heading">Aura</div>
        <vaadin-drawer-toggle theme="tertiary permanent"></vaadin-drawer-toggle>
      </header>

      <vaadin-scroller slot="drawer" theme="overflow-indicators">
        <vaadin-side-nav>
          <vaadin-side-nav-item data-view-name="components-view">
            <vaadin-icon src="./assets/lucide-icons/home.svg" slot="prefix"></vaadin-icon>
            Overview
          </vaadin-side-nav-item>
        </vaadin-side-nav>

        <hr />

        <vaadin-side-nav collapsible>
          <span slot="label">Dashboard</span>

          <vaadin-side-nav-item path="" data-view-name="dashboard-view">
            <vaadin-icon src="./assets/lucide-icons/layout-panel-left.svg" slot="prefix"></vaadin-icon>
            Overview
            <vaadin-badge slot="suffix" number="2" aria-label="(2 new items)"></vaadin-badge>
          </vaadin-side-nav-item>

          <vaadin-side-nav-item data-view-name="grid-mdl-view">
            <vaadin-icon src="./assets/lucide-icons/layers.svg" slot="prefix"></vaadin-icon>
            Products
          </vaadin-side-nav-item>

          <vaadin-side-nav-item>
            <vaadin-icon icon="vaadin:dollar" slot="prefix"></vaadin-icon>
            Revenue
          </vaadin-side-nav-item>

          <vaadin-side-nav-item>
            <vaadin-icon icon="vaadin:line-chart" slot="prefix"></vaadin-icon>
            Engagement
          </vaadin-side-nav-item>

          <vaadin-side-nav-item>
            <vaadin-icon icon="vaadin:area-select" slot="prefix"></vaadin-icon>
            Integrations
          </vaadin-side-nav-item>

          <vaadin-side-nav-item>
            <vaadin-icon icon="vaadin:invoice" slot="prefix"></vaadin-icon>
            Billing
          </vaadin-side-nav-item>
        </vaadin-side-nav>

        <hr />

        <vaadin-side-nav collapsible>
          <span slot="label">Users</span>

          <vaadin-side-nav-item>
            <vaadin-icon src="./assets/lucide-icons/users.svg" slot="prefix"></vaadin-icon>
            Manage
          </vaadin-side-nav-item>

          <vaadin-side-nav-item>
            <vaadin-icon icon="vaadin:credit-card" slot="prefix"></vaadin-icon>
            Billing
          </vaadin-side-nav-item>

          <vaadin-side-nav-item>
            <vaadin-icon src="./assets/lucide-icons/user-plus.svg" slot="prefix"></vaadin-icon>
            Invite
          </vaadin-side-nav-item>

          <vaadin-side-nav-item>
            <vaadin-icon icon="vaadin:key-o" slot="prefix"></vaadin-icon>
            API Keys
          </vaadin-side-nav-item>
        </vaadin-side-nav>

        <hr />

        <vaadin-side-nav collapsible collapsed>
          <span slot="label">Modules</span>
        </vaadin-side-nav>

        <hr />

        <vaadin-side-nav collapsible collapsed>
          <span slot="label">Extensions</span>
        </vaadin-side-nav>
      </vaadin-scroller>

      <footer slot="drawer" class="aura-view-footer">
        <vaadin-button theme="tertiary">
          <vaadin-avatar abbr="J" style="--vaadin-avatar-size: 1.25lh" slot="prefix" theme="filled"></vaadin-avatar>
          <span>John Smith</span>
        </vaadin-button>
      </footer>

      <dashboard-view></dashboard-view>
    </vaadin-app-layout>
    <aura-theme-editor></aura-theme-editor>
  </body>
</html>
