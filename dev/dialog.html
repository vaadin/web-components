<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dialog</title>
    <script type="module" src="./common.js"></script>
  </head>

  <body>
    <vaadin-dialog></vaadin-dialog>

    <vaadin-button>Open dialog 1</vaadin-button>
    <vaadin-button id="open-modeless">Open modeless dialog</vaadin-button>
    <vaadin-button id="open-modeless-no-focus-trap">Open modeless dialog (no-focus-trap)</vaadin-button>
    <vaadin-button id="open-modeless-no-auto-focus">Open modeless dialog (no-auto-focus)</vaadin-button>
    <input placeholder="Page input (for testing Tab and Esc)" />

    <script type="module">
      import '@vaadin/dialog';
      import '@vaadin/button';
      import '@vaadin/icon';

      const dialog1 = document.querySelector('vaadin-dialog');
      dialog1.headerTitle = 'Title';
      dialog1.draggable = true;
      dialog1.resizable = true;

      dialog1.renderer = (root) => {
        if (root.firstChild) {
          return;
        }

        const container = document.createElement('div');
        container.style.maxWidth = '40em';
        container.style.minWidth = '20em';
        root.appendChild(container);

        // Second dialog
        const dialog2 = document.createElement('vaadin-dialog');
        dialog2.renderer = (root2) => {
          if (root2.firstChild) {
            return;
          }

          // Close second dialog
          const btnClose2 = document.createElement('vaadin-button');
          btnClose2.textContent = 'Close dialog 2';
          btnClose2.addEventListener('click', () => {
            dialog2.opened = false;
          });

          root2.appendChild(btnClose2);
        };

        container.appendChild(dialog2);

        // Open second dialog
        const btnOpen2 = document.createElement('vaadin-button');
        btnOpen2.textContent = 'Open dialog 2';
        btnOpen2.addEventListener('click', () => {
          dialog2.opened = true;
        });

        const text = document.createElement('p');
        text.textContent =
          'Lorem ipsum dolor sit amet, consectetur adipisicing elit. Distinctio laborum optio quo perferendis unde, fuga reprehenderit molestias cum laboriosam ipsa enim voluptatem iusto fugit. Sed, veniam repudiandae consectetur recusandae laudantium.';
        text.style.marginTop = '0';

        container.append(text, btnOpen2);
      };

      dialog1.headerRenderer = (root) => {
        if (root.firstChild) {
          return;
        }
        const button = document.createElement('vaadin-button');
        button.innerHTML = '<vaadin-icon icon="lumo:cross" aria-label="close dialog"></vaadin-icon>';
        button.setAttribute('theme', 'tertiary icon');
        button.addEventListener('click', () => {
          dialog1.opened = false;
        });

        const text = document.createElement('span');
        text.textContent = 'Header content';

        root.append(text, button);
      };

      dialog1.footerRenderer = (root) => {
        if (root.firstChild) {
          return;
        }
        const button = document.createElement('vaadin-button');
        button.textContent = 'Action';
        button.theme = 'primary';

        const button2 = document.createElement('vaadin-button');
        button2.textContent = 'Action';

        const text = document.createElement('span');
        text.textContent = 'Footer content';

        root.append(text, button2, button);
      };

      // Open first dialog
      const btnOpen1 = document.querySelector('vaadin-button');
      btnOpen1.addEventListener('click', () => {
        dialog1.opened = true;
      });

      // Modeless dialogs
      function createModelessDialog(title, { noFocusTrap = false, noAutoFocus = false } = {}) {
        const dialog = document.createElement('vaadin-dialog');
        dialog.headerTitle = title;
        dialog.modeless = true;
        dialog.draggable = true;
        dialog.noFocusTrap = noFocusTrap;
        dialog.noAutoFocus = noAutoFocus;

        dialog.renderer = (root) => {
          if (root.firstChild) {
            return;
          }

          const input = document.createElement('input');
          input.placeholder = 'Dialog input';

          const btnClose = document.createElement('vaadin-button');
          btnClose.textContent = 'Close';
          btnClose.addEventListener('click', () => {
            dialog.opened = false;
          });

          root.append(input, btnClose);
        };

        document.body.appendChild(dialog);
        return dialog;
      }

      const modelessDialog = createModelessDialog('Modeless dialog');
      document.querySelector('#open-modeless').addEventListener('click', () => {
        modelessDialog.opened = true;
      });

      const modelessNoFocusTrapDialog = createModelessDialog('Modeless dialog (no-focus-trap)', {
        noFocusTrap: true,
      });
      document.querySelector('#open-modeless-no-focus-trap').addEventListener('click', () => {
        modelessNoFocusTrapDialog.opened = true;
      });

      const modelessNoAutoFocusDialog = createModelessDialog('Modeless dialog (no-auto-focus)', {
        noAutoFocus: true,
      });
      document.querySelector('#open-modeless-no-auto-focus').addEventListener('click', () => {
        modelessNoAutoFocusDialog.opened = true;
      });
    </script>
  </body>
</html>
