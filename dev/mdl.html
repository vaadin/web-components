<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Master-Detail Layout 2.0</title>
    <script type="module" src="./common.js"></script>
    <script type="module">
      window.Vaadin ||= {};
      window.Vaadin.featureFlags ||= {};
      window.Vaadin.featureFlags.masterDetailLayoutComponent = true;
      window.Vaadin.featureFlags.badgeComponent = true;
    </script>
    <style>
      html,
      body {
        height: 100%;
        padding: 0;
        margin: 0;
      }
    </style>
  </head>

  <body>
    Test
    <vaadin-master-detail-layout master-size="600px" detail-size="400px" expand="master">
      <div>
        <vaadin-grid>
          <vaadin-grid-column path="name" width="200px" flex-shrink="0"></vaadin-grid-column>
          <vaadin-grid-column path="name" width="200px" flex-shrink="0"></vaadin-grid-column>
          <vaadin-grid-column path="name" width="200px" flex-shrink="0"></vaadin-grid-column>
        </vaadin-grid>
      </div>
      <div slot="detail" style="padding: var(--vaadin-gap-m); box-sizing: border-box;" hidden>
        <vaadin-form-layout auto-responsive>
          <vaadin-text-field label="First name"></vaadin-text-field>
          <vaadin-text-field label="Last name"></vaadin-text-field>
          <vaadin-button>Save</vaadin-button>
        </vaadin-form-layout>
      </div>
    </vaadin-master-detail-layout>

    <script type="module">
      import '@vaadin/grid/all-imports.js';
      import '@vaadin/mdl';
      import '@vaadin/form-layout';
      import '@vaadin/text-field';
      import '@vaadin/button';

      const grid = document.querySelector('vaadin-grid');
      grid.items = grid.items = Array.from({ length: 100 }, (_, i) => {
        return { name: `Item ${i}` };
      });
      grid.addEventListener('click', () => {
        const detail = document.querySelector('[slot="detail"]');
        detail.hidden = false;
      });

      const button = document.querySelector('vaadin-button');
      button.addEventListener('click', () => {
        const detail = document.querySelector('[slot="detail"]');
        detail.hidden = true;
      });
    </script>
  </body>
</html>
