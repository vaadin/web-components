<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Master-Detail Layout</title>
    <script type="module" src="./common.js"></script>

    <style>
      html,
      body {
        height: 100%;
        padding: 0;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <script type="module">
      import '@vaadin/grid/all-imports';

      const grid = document.querySelector('vaadin-grid');

      grid.dataProvider = ({ parentItem, page, pageSize }, cb) => {
        // Let's have 100 root-level items and 5 items on every child level
        const levelSize = parentItem ? 5 : 100;

        const pageItems = [...Array(Math.min(levelSize, pageSize))].map((_, i) => {
          const indexInLevel = page * pageSize + i;

          return {
            name: `${parentItem ? parentItem.name + '-' : ''}${indexInLevel}`,
            children: true,
          };
        });

        cb(pageItems, levelSize);
      };
    </script>

    <master-detail-layout master-size="max-content" detail-size="15rem" expand="master">
      <div slot="master">
        <vaadin-grid item-id-path="name">
          <vaadin-grid-selection-column auto-select frozen drag-select></vaadin-grid-selection-column>
          <vaadin-grid-tree-column frozen path="name" width="200px" flex-shrink="0"></vaadin-grid-tree-column>
          <vaadin-grid-column path="name" width="200px" flex-shrink="0"></vaadin-grid-column>
          <vaadin-grid-column path="name" width="200px" flex-shrink="0"></vaadin-grid-column>
          <vaadin-grid-column path="name" width="200px" flex-shrink="0"></vaadin-grid-column>
        </vaadin-grid>
      </div>
      <div slot="detail"> Detail Content </div>
    </master-detail-layout>

    <script type="module">
      import '@vaadin/component-base/src/styles/style-props.js';
      import { css, html, LitElement, render } from 'lit';
      import { PolylitMixin } from '@vaadin/component-base/src/polylit-mixin.js';

      class MasterDetailLayout extends PolylitMixin(LitElement) {
        static get is() {
          return 'master-detail-layout';
        }

        static get properties() {
          return {
            masterSize: {
              type: String,
              sync: true,
              observer: '__masterSizeChanged',
            },

            detailSize: {
              type: String,
              sync: true,
              observer: '__detailSizeChanged',
            },

            expand: {
              type: String,
              sync: true,
              reflectToAttribute: true,
            },
          };
        }

        static get styles() {
          return css`
            :host {
              --_master-max-size: var(--_master-size);
              --_detail-max-size: var(--_detail-size);
              --_master-col: minmax(var(--_master-size), var(--_master-max-size));
              --_detail-col: minmax(var(--_detail-size), var(--_detail-max-size));

              display: grid;
              overflow: hidden;
              position: relative;
              height: 100%;
              grid-template-columns: var(--_master-col) var(--_detail-col);
            }

            :host(:not([expand])) {
              --_master-max-size: 1fr;
              --_detail-max-size: 1fr;
            }

            :host([expand='master']) {
              --_master-max-size: 1fr;
            }

            :host([expand='detail']) {
              --_detail-max-size: 1fr;
            }

            [part~='backdrop'] {
              position: absolute;
              inset: 0;
              z-index: 1;
              display: none;
              background: rgba(0, 0, 0, 0.2);
            }

            :host([overflow]) [part~='detail'] {
              position: absolute;
              z-index: 2;
              inset-block: 0;
              inset-inline-end: 0;
              width: var(--_detail-size);
              background: var(--vaadin-background-color);
              box-shadow: 0 0 20px 0 rgba(0, 0, 0, 0.3);
            }

            :host([overflow]) [part~='backdrop'] {
              display: block;
            }
          `;
        }

        connectedCallback() {
          super.connectedCallback();

          this.__hostResizeObserver = new ResizeObserver(() => {
            const { gridTemplateColumns } = getComputedStyle(this);
            const [masterSizePx, detailSizePx] = gridTemplateColumns.split(' ').map(parseFloat);
            const hasOverflow = masterSizePx + detailSizePx > this.offsetWidth;
            this.toggleAttribute('overflow', hasOverflow);
          });
          this.__hostResizeObserver.observe(this);

          // this.__detailResizeObserver = new ResizeObserver((entries) => {
          //   this.toggleAttribute(
          //     'has-detail',
          //     entries.some(({ target }) => target.checkVisibility()),
          //   );
          // });
        }

        render() {
          return html`
            <div part="backdrop"></div>
            <div part="master">
              <slot name="master"></slot>
            </div>
            <div part="detail">
              <slot name="detail" @slotchange="${this.__onDetailSlotChange}"></slot>
            </div>
          `;
        }

        __onDetailSlotChange(event) {
          // this.__detailResizeObserver.disconnect();

          // const children = event.target.assignedNodes();
          // if (children.length > 0) {
          //   children.forEach((child) => {
          //     this.__detailResizeObserver.observe(child);
          //   });
          // } else {
          //   this.removeAttribute('has-detail');
          // }
        }

        __masterSizeChanged(masterSize) {
          this.style.setProperty('--_master-size', masterSize);
        }

        __detailSizeChanged(detailSize) {
          this.style.setProperty('--_detail-size', detailSize);
        }
      }

      customElements.define(MasterDetailLayout.is, MasterDetailLayout);
    </script>
  </body>
</html>
