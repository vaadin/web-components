<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email — Folders - List - Message</title>
    <script type="module" src="../common.js"></script>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: system-ui, sans-serif;
      }

      /* Folder pane */
      .folder-pane {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .folder-pane h2 {
        margin: 0;
        padding: 16px;
        font-size: 1.1rem;
        border-bottom: 1px solid #e0e0e0;
      }

      .folder-pane vaadin-grid {
        flex: 1;
        min-height: 0;
        border: none;
        border-radius: 0;
      }

      .folder-cell {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 0;
        cursor: pointer;
        font-size: 0.9rem;
      }

      .folder-count {
        margin-left: auto;
        color: #888;
        font-size: 0.8rem;
      }

      /* Inner layout */
      #innerLayout {
        border-left: 1px solid #e0e0e0;
      }

      /* Master pane */
      .master-pane {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .master-pane-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 16px;
        border-bottom: 1px solid #e0e0e0;
      }

      .master-pane-header h2 {
        margin: 0;
        font-size: 1.1rem;
      }

      .back-btn {
        display: none;
        cursor: pointer;
        background: none;
        border: 1px solid #ccc;
        border-radius: 6px;
        padding: 4px 12px;
        font-size: 0.85rem;
      }

      #outerLayout[overflow] .back-btn {
        display: block;
      }

      .master-pane vaadin-grid {
        flex: 1;
        min-height: 0;
        border: none;
        border-radius: 0;
      }

      /* Detail pane */
      .detail-pane {
        display: flex;
        flex-direction: column;
        height: 100%;
        overflow: auto;
      }

      .detail-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px;
        border-bottom: 1px solid #e0e0e0;
        flex-shrink: 0;
      }

      .detail-header .close-btn {
        cursor: pointer;
        background: none;
        border: 1px solid #ccc;
        border-radius: 6px;
        padding: 4px 12px;
        font-size: 0.85rem;
      }

      .detail-subject {
        font-size: 1.2rem;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .detail-meta {
        padding: 16px;
        color: #666;
        font-size: 0.9rem;
        line-height: 1.6;
        border-bottom: 1px solid #e0e0e0;
      }

      .detail-body {
        padding: 16px 24px;
        line-height: 1.7;
        font-size: 0.95rem;
      }

      .detail-body p {
        margin: 0 0 1em;
      }

      .detail-placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #999;
      }

      /* Email cell */
      .email-cell {
        display: flex;
        flex-direction: column;
        gap: 2px;
        padding: 8px 0;
        cursor: pointer;
      }

      .email-from {
        font-weight: 600;
        font-size: 0.9rem;
      }

      .email-subject {
        font-size: 0.85rem;
      }

      .email-preview {
        font-size: 0.8rem;
        color: #888;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .email-date {
        font-size: 0.75rem;
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <vaadin-master-detail-layout
      id="outerLayout"
      master-size="200px"
      detail-size="30rem"
      expand="detail"
      overlay-size="100%"
      no-animation
    >
      <div class="folder-pane">
        <h2>Mail</h2>
        <vaadin-grid id="folderGrid" theme="no-border no-row-borders"></vaadin-grid>
      </div>

      <vaadin-master-detail-layout
        id="innerLayout"
        master-size="400px"
        detail-size="30rem"
        expand="detail"
        overlay-size="100%"
        no-animation
      >
        <div class="master-pane">
          <div class="master-pane-header">
            <button class="back-btn" id="backBtn">&larr; Back</button>
            <h2 id="folderTitle">Inbox</h2>
          </div>
          <vaadin-grid id="emailGrid" theme="no-border no-row-borders"></vaadin-grid>
        </div>
        <div class="detail-placeholder" slot="detail-placeholder">Select a message to read</div>
      </vaadin-master-detail-layout>
    </vaadin-master-detail-layout>

    <script type="module">
      window.Vaadin ||= {};
      window.Vaadin.featureFlags ||= {};
      window.Vaadin.featureFlags.masterDetailLayoutComponent = true;

      import '@vaadin/grid/all-imports';
      import '@vaadin/master-detail-layout';

      const folders = [
        { name: 'Inbox', icon: '📥', count: 5 },
        { name: 'Sent', icon: '📤', count: 12 },
        { name: 'Archived', icon: '📦', count: 34 },
      ];

      const emails = [
        {
          id: 1,
          from: 'Patricia Nguyen',
          fromEmail: 'p.nguyen@acme.com',
          to: 'David Chen',
          toEmail: 'd.chen@acme.com',
          subject: 'Q1 Budget Review — Meeting Request',
          date: '2026-02-04T09:15:00Z',
          preview: "Hi David, I'd like to schedule a meeting to go over the Q1 budget numbers…",
          body: "<p>Hi David,</p><p>I'd like to schedule a meeting to go over the Q1 budget numbers before the leadership presentation on the 20th. Finance flagged a 12% variance on infrastructure spend that we should discuss.</p><p>Thursday afternoon or Friday morning both seem open on your calendar. Could you confirm which works better?</p>",
        },
        {
          id: 2,
          from: 'Marcus Webb',
          fromEmail: 'm.webb@acme.com',
          to: 'All Engineering',
          toEmail: 'eng-all@acme.com',
          subject: 'New Hire Onboarding Checklist — Please Review',
          date: '2026-02-07T14:30:00Z',
          preview: "Team, we've revamped the onboarding checklist for new engineering hires…",
          body: "<p>Team,</p><p>We've revamped the onboarding checklist for new engineering hires. We have three new developers starting on March 2nd.</p><p>Key changes: a buddy system pairing new hires with senior engineers, and a consolidated setup script for IDE, VPN, repos, and CI/CD permissions.</p><p>The updated checklist is in Confluence under Engineering > Onboarding.</p>",
        },
        {
          id: 3,
          from: 'Aisha Patel',
          fromEmail: 'a.patel@acme.com',
          to: 'Engineering & IT',
          toEmail: 'eng-it@acme.com',
          subject: 'Server Migration — Maintenance Window Feb 21-22',
          date: '2026-02-12T11:00:00Z',
          preview: 'Reminder: the planned server migration to our new data center will take place…',
          body: '<p>Reminder: the server migration takes place February 21–22. The maintenance window opens Saturday at 10 PM EST through Sunday 6 AM EST.</p><p>CI/CD pipelines, staging environments, and the artifact repository will be unavailable. Production systems will not be affected.</p><p>Please ensure any long-running jobs complete before Saturday evening.</p>',
        },
        {
          id: 4,
          from: 'Lena Kowalski',
          fromEmail: 'l.kowalski@acme.com',
          to: 'Product Team',
          toEmail: 'product@acme.com',
          subject: 'Beta Launch Feedback — Summary',
          date: '2026-02-18T16:45:00Z',
          preview: "I've compiled customer feedback from the first two weeks of our beta launch…",
          body: "<p>I've compiled the beta launch feedback highlights.</p><p>Overall sentiment is positive — 78% rated the experience 4 or 5 out of 5. The new dashboard and real-time notifications were called out as major improvements.</p><p>Main complaints: slow exports for large datasets and confusion around the permissions model. Full report attached.</p>",
        },
        {
          id: 5,
          from: 'Thomas Eriksson',
          fromEmail: 't.eriksson@acme.com',
          to: 'David Chen',
          toEmail: 'd.chen@acme.com',
          subject: 'Re: Security Audit Findings — Action Items',
          date: '2026-02-27T08:55:00Z',
          preview: "Following up on last week's security audit. The external team has finalized…",
          body: "<p>Following up on last week's security audit.</p><p>Critical finding: session tokens aren't invalidated properly on password change. Two medium items: overly permissive CORS headers and missing rate limiting on auth endpoints.</p><p>I've created tickets and assigned them to your team. The auditors recommend a 14-day remediation window for the critical item.</p>",
        },
      ];

      const outerLayout = document.getElementById('outerLayout');
      const innerLayout = document.getElementById('innerLayout');
      const folderGrid = document.getElementById('folderGrid');
      const emailGrid = document.getElementById('emailGrid');
      const folderTitle = document.getElementById('folderTitle');

      // Folder grid
      folderGrid.items = folders;

      const folderColumn = document.createElement('vaadin-grid-column');
      folderColumn.flexGrow = 1;
      folderColumn.renderer = (root, _column, model) => {
        const folder = model.item;
        root.innerHTML = `
          <div class="folder-cell">
            <span>${folder.icon}</span>
            <span>${folder.name}</span>
            <span class="folder-count">${folder.count}</span>
          </div>
        `;
      };
      folderGrid.appendChild(folderColumn);

      // Back button
      document.getElementById('backBtn').addEventListener('click', () => {
        closeEmailDetail();
        outerLayout._setDetail(null);
        folderGrid.activeItem = null;
        folderGrid.selectedItems = [];
      });

      // Select Inbox by default
      folderGrid.selectedItems = [folders[0]];
      outerLayout._setDetail(innerLayout, true);

      folderGrid.addEventListener('active-item-changed', (e) => {
        const item = e.detail.value;
        if (!item) return;
        folderGrid.selectedItems = [item];
        folderTitle.textContent = item.name;
        closeEmailDetail();
        outerLayout._setDetail(innerLayout);
      });

      // Email grid
      emails.sort((a, b) => new Date(b.date) - new Date(a.date));
      emailGrid.items = emails;

      const emailColumn = document.createElement('vaadin-grid-column');
      emailColumn.flexGrow = 1;
      emailColumn.renderer = (root, _column, model) => {
        const email = model.item;
        const d = new Date(email.date);
        const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        root.innerHTML = `
          <div class="email-cell">
            <div style="display:flex;justify-content:space-between;align-items:baseline">
              <span class="email-from">${email.from}</span>
              <span class="email-date">${dateStr}</span>
            </div>
            <div class="email-subject">${email.subject}</div>
            <div class="email-preview">${email.preview}</div>
          </div>
        `;
      };
      emailGrid.appendChild(emailColumn);

      // Email detail
      function createDetailElement(email) {
        const d = new Date(email.date);
        const dateStr = d.toLocaleDateString('en-US', {
          weekday: 'long',
          year: 'numeric',
          month: 'long',
          day: 'numeric',
          hour: 'numeric',
          minute: '2-digit',
        });

        const detail = document.createElement('div');
        detail.classList.add('detail-pane');
        detail.innerHTML = `
          <div class="detail-header">
            <button class="close-btn" id="closeBtn">Close</button>
            <div class="detail-subject">${email.subject}</div>
          </div>
          <div class="detail-meta">
            <div><strong>From:</strong> ${email.from} &lt;${email.fromEmail}&gt;</div>
            <div><strong>To:</strong> ${email.to} &lt;${email.toEmail}&gt;</div>
            <div><strong>Date:</strong> ${dateStr}</div>
          </div>
          <div class="detail-body">${email.body}</div>
        `;

        detail.querySelector('#closeBtn').addEventListener('click', closeEmailDetail);
        return detail;
      }

      function closeEmailDetail() {
        innerLayout._setDetail(null);
        emailGrid.activeItem = null;
        emailGrid.selectedItems = [];
      }

      emailGrid.addEventListener('active-item-changed', (e) => {
        const item = e.detail.value;
        if (!item) return;
        emailGrid.selectedItems = [item];
        innerLayout._setDetail(createDetailElement(item));
      });

      innerLayout.addEventListener('backdrop-click', closeEmailDetail);
      innerLayout.addEventListener('detail-escape-press', closeEmailDetail);

      function closeFolderDetail() {
        closeEmailDetail();
        outerLayout._setDetail(null);
        folderGrid.activeItem = null;
        folderGrid.selectedItems = [];
      }
      outerLayout.addEventListener('backdrop-click', closeFolderDetail);
      outerLayout.addEventListener('detail-escape-press', closeFolderDetail);
    </script>
  </body>
</html>
