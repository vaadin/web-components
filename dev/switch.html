<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Switch</title>
    <script type="module" src="./common.js"></script>
    <script type="module">
      // Enable feature flag
      window.Vaadin ||= {};
      window.Vaadin.featureFlags ||= {};
      window.Vaadin.featureFlags.switchComponent = true;

      import '@vaadin/switch';
    </script>
  </head>

  <body>
    <vaadin-switch label="Notifications"></vaadin-switch>
    <vaadin-switch label="Checked" checked></vaadin-switch>
    <vaadin-switch label="Disabled" disabled></vaadin-switch>
    <vaadin-switch label="Read-only" checked readonly></vaadin-switch>
  </body>
</html>
