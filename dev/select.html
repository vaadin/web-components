<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select</title>
    <script type="module" src="./common.js"></script>
  </head>
  <body>
    <vaadin-select label="Size (items)"></vaadin-select>

    <vaadin-select label="Size (slotted)" value="m">
      <vaadin-select-list-box slot="overlay">
        <vaadin-select-item value="all">Show all</vaadin-select-item>
        <hr />
        <vaadin-select-item value="xs" disabled>XS (out of stock)</vaadin-select-item>
        <vaadin-select-item value="s">S</vaadin-select-item>
        <vaadin-select-item value="m">M</vaadin-select-item>
        <vaadin-select-item value="l">L</vaadin-select-item>
        <vaadin-select-item value="xl">XL</vaadin-select-item>
      </vaadin-select-list-box>
    </vaadin-select>

    <script type="module">
      import '@vaadin/select';
      import '@vaadin/select/src/vaadin-select-item.js';
      import '@vaadin/select/src/vaadin-select-list-box.js';

      const select = document.querySelector('vaadin-select');
      select.items = [
        { label: 'Show all', value: 'all' },
        { component: 'hr' },
        { label: 'XS (out of stock)', value: 'xs', disabled: true },
        { label: 'S', value: 's' },
        { label: 'M', value: 'm' },
        { label: 'L', value: 'l' },
        { label: 'XL', value: 'xl' },
      ];
    </script>
  </body>
</html>
