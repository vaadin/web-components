<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Badge</title>
    <script type="module" src="./common.js"></script>
    <script>
      window.Vaadin ??= {};
      window.Vaadin.featureFlags ??= {};
      window.Vaadin.featureFlags.badgeComponent = true;
    </script>
    <script type="module">
      import '@vaadin/badge';
      import '@vaadin/icon';
      import '@vaadin/icons';
    </script>
  </head>

  <body>
    <section class="section">
      <h2 class="heading">Label</h2>
      <vaadin-badge>Completed</vaadin-badge>
    </section>

    <section class="section">
      <h2 class="heading">Size</h2>
      <vaadin-badge>Default</vaadin-badge>
      <vaadin-badge theme="small">Small</vaadin-badge>
    </section>

    <section class="section">
      <h2 class="heading">Icon</h2>
      <vaadin-badge>
        <vaadin-icon slot="icon" icon="vaadin:check"></vaadin-icon>
        <span>Completed</span>
      </vaadin-badge>
      <vaadin-badge>
        <vaadin-icon slot="icon" icon="vaadin:check"></vaadin-icon>
      </vaadin-badge>
    </section>

    <section class="section">
      <h2 class="heading">Number</h2>
      <vaadin-badge number="3">
        <span>new emails</span>
      </vaadin-badge>
      <vaadin-badge number="1"></vaadin-badge>
      <vaadin-badge number="12"></vaadin-badge>
      <vaadin-badge number="123"></vaadin-badge>
    </section>

    <section class="section">
      <h2 class="heading">Icon / number only</h2>
      <vaadin-badge number="3" theme="icon-only">
        <vaadin-icon slot="icon" icon="vaadin:check"></vaadin-icon>
        <span>Completed</span>
      </vaadin-badge>
      <vaadin-badge number="3" theme="number-only">
        <vaadin-icon slot="icon" icon="vaadin:check"></vaadin-icon>
        <span>Completed</span>
      </vaadin-badge>
    </section>

    <section class="section">
      <h2 class="heading">Dot</h2>
      <vaadin-badge number="3" theme="dot">
        <vaadin-icon slot="icon" icon="vaadin:check"></vaadin-icon>
        <span>Completed</span>
      </vaadin-badge>
    </section>

    <section class="section">
      <h2 class="heading">Colors</h2>
      <vaadin-badge>Default</vaadin-badge>
      <vaadin-badge theme="success">Success</vaadin-badge>
      <vaadin-badge theme="warning">Warning</vaadin-badge>
      <vaadin-badge theme="error">Error</vaadin-badge>
      <vaadin-badge theme="contrast" class="aura-accent-neutral">Neutral</vaadin-badge>
    </section>

    <section class="section">
      <h2 class="heading">Filled</h2>
      <vaadin-badge theme="filled">Default</vaadin-badge>
      <vaadin-badge theme="filled success">Success</vaadin-badge>
      <vaadin-badge theme="filled warning">Warning</vaadin-badge>
      <vaadin-badge theme="filled error">Error</vaadin-badge>
      <vaadin-badge theme="filled contrast" class="aura-accent-neutral">Neutral</vaadin-badge>
    </section>
  </body>
</html>
