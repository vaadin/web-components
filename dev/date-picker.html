<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Date Picker</title>
    <script type="module" src="./common.js"></script>
  </head>
  <body>
    <vaadin-date-picker label="Start date">
      <vaadin-tooltip slot="tooltip" text="Counted as first day"></vaadin-tooltip>
    </vaadin-date-picker>

    <script type="module">
      import '@vaadin/date-picker';
      import '@vaadin/tooltip';

      const isDateDisabled = (date) => {
        // Exclude weekends and the 16th day of each month:
        const checkDate = new Date(0, 0);
        checkDate.setFullYear(date.year);
        checkDate.setMonth(date.month);
        checkDate.setDate(date.day);
        return checkDate.getDay() === 0 || checkDate.getDay() === 6 || checkDate.getDate() === 16;
      };

      const picker = document.querySelector('vaadin-date-picker');
      picker.isDateDisabled = isDateDisabled;
      picker.min = '2023-11-01';
    </script>

    <h3>Disabled dates provider</h3>
    <p>
      Mondays and the 20th of each month are disabled. They are loaded asynchronously (a spinner is
      shown while loading) via <code>disabledDatesProvider</code>. Results are cached and prefetched
      around the visible months, so scrolling back and forth does not re-fetch.
    </p>
    <vaadin-date-picker id="disabled-dates-provider" label="Reservation date"></vaadin-date-picker>

    <script type="module">
      document.querySelector('#disabled-dates-provider').disabledDatesProvider = ({ start, end }) =>
        new Promise((resolve) => {
          setTimeout(() => {
            const disabled = [];
            const date = new Date(start.year, start.month, start.day);
            const last = new Date(end.year, end.month, end.day);
            while (date <= last) {
              if (date.getDay() === 1 || date.getDate() === 20) {
                disabled.push({ year: date.getFullYear(), month: date.getMonth(), day: date.getDate() });
              }
              date.setDate(date.getDate() + 1);
            }
            resolve(disabled);
          }, 600);
        });
    </script>
  </body>
</html>
